<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@200;400;600&display=swap');

        :root {
            --space-bg: #05050a;
            --nebula-1: #1a0b2e;
            --accent: #00e5ff; 
            --cake-pink: #ff85a1;
            --cake-yellow: #fff176;
            --letter-bg: #ffffff;
            --bow-pink: #ff4081;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--space-bg), var(--nebula-1), var(--space-bg));
            color: white;
        }

        /* --- START OVERLAY SECTION --- */
        #start-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--space-bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }
        .start-button {
            padding: 15px 30px;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 5vw, 2rem);
            background: var(--bow-pink);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 64, 129, 0.5);
            text-align: center;
            max-width: 80%;
        }

        /* --- BACKGROUND DECOR --- */
        .ribbon-bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1; 
            overflow: hidden;
        }
        .falling-ribbon {
            position: absolute;
            top: -150px;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--bow-pink), transparent);
            animation: fallVertical linear infinite;
        }
        @keyframes fallVertical {
            to { transform: translateY(110vh); }
        }

        /* --- SCENE MANAGEMENT --- */
        .scene {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
            text-align: center;
            z-index: 2;
            padding: 20px;
            box-sizing: border-box;
        }
        .active-scene { display: flex; opacity: 1; }

        /* --- SCENE 1: UPSCALE TEDDY --- */
        .scene1-image-container {
            width: 100%;
            max-width: 450px;
            height: auto;
            animation: bounce 2s infinite ease-in-out;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .scene1-image {
            width: 90%;
            height: auto;
            border-radius: 20px;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- SCENE 2: CAKE --- */
        .cake { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 250px; width: 100%; max-width: 300px; perspective: 1000px; margin-bottom: 40px; }
        .tier { position: relative; border-radius: 0 0 100px 100px / 0 0 40px 40px; border: 1px solid rgba(255,255,255,0.1); }
        .tier::before { content: ''; position: absolute; top: -15px; left: -1px; width: calc(100% + 2px); height: 30px; border-radius: 50%; background: inherit; }
        .tier-bottom { width: 220px; height: 70px; background: var(--cake-pink); z-index: 1; }
        .tier-mid { width: 170px; height: 60px; background: var(--cake-yellow); z-index: 2; margin-bottom: -30px; }
        .tier-top { width: 120px; height: 50px; background: var(--cake-pink); z-index: 3; margin-bottom: -25px; }
        #candle-stick { width: 8px; height: 40px; background: linear-gradient(to right, #eee, #fff, #eee); position: absolute; top: -55px; left: 50%; transform: translateX(-50%); z-index: 4; border-radius: 2px; }
        #flame { width: 12px; height: 20px; background: #ffcc00; border-radius: 50% 50% 20% 20%; position: absolute; top: -75px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px #ff9900; z-index: 5; transition: opacity 0.5s ease; }

        /* --- SCENE 3: ENVELOPE --- */
        .delivery-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 350px;
        }
        .letter-wrapper {
            position: absolute;
            width: clamp(260px, 80vw, 420px);
            height: clamp(160px, 50vw, 280px);
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite, envelopeFloat 3s infinite ease-in-out;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, opacity 2s ease;
            z-index: 10;
            overflow: hidden;
            border-radius: 12px;
            border: 4px solid rgba(255,255,255,0.2);
            opacity: 0;
        }
        .envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.1);
            clip-path: polygon(0 0, 100% 0, 50% 60%);
            transition: transform 0.6s ease;
            z-index: 5;
            transform-origin: top;
        }
        .letter-wrapper.open .envelope-flap { transform: rotateX(180deg); z-index: 0; }

        /* --- POPUP --- */
        #manuscript-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 450px;
            min-height: 300px;
            background: #fdf5e6;
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            color: #4a3728;
            padding: 30px;
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            clip-path: polygon(0% 5%, 5% 2%, 10% 5%, 90% 0%, 95% 4%, 100% 2%, 98% 30%, 100% 70%, 97% 95%, 70% 98%, 30% 100%, 5% 97%, 0% 70%, 2% 30%);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .popup-active { transform: translate(-50%, -50%) scale(1) !important; }
        .manuscript-text { font-family: 'Dancing Script', cursive; font-size: clamp(1.2rem, 4vw, 1.6rem); line-height: 1.4; text-align: center; }

        /* --- SCENE 4: ORBIT --- */
        #orbit-system { position: relative; width: 100%; height: 80%; display: flex; justify-content: center; align-items: center; transform-style: preserve-3d; }
        #satellite-container { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; animation: rotateSystem 25s linear infinite; animation-play-state: paused; }
        .photo-card { position: absolute; background: #111; padding: 5px; border-radius: 8px; opacity: 0; object-fit: cover; left: 50%; top: 50%; transition: transform 0.6s ease, opacity 1s ease; border: 1px solid rgba(255,255,255,0.1); }
        .photo-main { z-index: 100; width: 180px; height: 240px; margin-left: -90px; margin-top: -120px; border: 3px solid white; }
        .photo-orbit { width: 120px; height: 160px; margin-left: -60px; margin-top: -80px; }

        @media (max-width: 600px) {
            .photo-main { width: 140px; height: 190px; margin-left: -70px; margin-top: -95px; }
            .photo-orbit { width: 80px; height: 110px; margin-left: -40px; margin-top: -55px; }
            #date-typing { font-size: 2.2rem !important; }
        }

        @keyframes rotateSystem { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes envelopeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .final-wish { font-family: 'Dancing Script'; font-size: 1.8rem; color: var(--accent); position: absolute; bottom: 5%; opacity: 0; width: 100%; transition: opacity 2s; }
        .bow-wrap { pointer-events: none; }
        
        .ribbon-vertical { position: absolute; top: 0; left: 50%; width: 30px; height: 100%; background: var(--bow-pink); transform: translateX(-50%); z-index: 6; }
        .bow-knot { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: var(--bow-pink); border-radius: 50%; z-index: 8; border: 2px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="start-screen">
        <button class="start-button" onclick="startEverything()">Click to Celebrate Your Birthday! ✨</button>
    </div>

    <audio id="bg-music" loop>
        <source src="saiyara.mp3" type="audio/mpeg">
    </audio>

    <div class="ribbon-bg-layer" id="ribbon-layer"></div>

    <div id="manuscript-popup">
        <div class="manuscript-text">
            Hello Sumitra,<br><br>
            You are the most special person in my life. Every moment with you is a treasure. I hope this year brings you as much happiness as you bring to everyone around you!
        </div>
        <button style="margin-top:20px; background: var(--bow-pink); color:white; border:none; padding:10px 20px; border-radius:20px;" onclick="goToOrbit()">Next →</button>
    </div>

    <div id="scene1" class="scene">
        <div class="scene1-image-container">
            <img src="teddy.png" alt="Birthday Celebration" class="scene1-image">
        </div>
        <div id="type-target" style="font-family: 'Dancing Script'; font-size: clamp(1.8rem, 6vw, 2.8rem); color: var(--accent);"></div>
    </div>

    <div id="scene2" class="scene">
        <h2 style="font-family: 'Dancing Script'; color: var(--accent); margin-bottom: 20px;">Blow the Candle and <br>Make a wish...</h2>
        <div class="cake">
            <div class="tier tier-top">
                <div id="candle-stick"></div>
                <div id="flame"></div>
            </div>
            <div class="tier tier-mid"></div>
            <div class="tier tier-bottom"></div>
        </div>
        <div id="date-typing" style="font-family: 'Dancing Script'; font-size: 3rem; color: var(--cake-yellow);"></div>
    </div>

    <div id="scene3" class="scene">
        <div class="delivery-wrapper">
            <div class="teddy-part" id="teddy-scene3" style="width:100%; display:flex; justify-content:center;">
                <img src="teddy.png" class="scene1-image" style="max-width:300px;">
            </div>
            <div class="letter-wrapper" id="envelope" onclick="openLetter()">
                <div class="envelope-flap"></div>
                <div class="ribbon-vertical"></div>
                <div class="bow-knot"></div>
            </div>
        </div>
        <div class="letter-text" id="msg-text" style="font-family: 'Dancing Script'; font-size: 2rem; opacity:0; transition: 2s;">A Message for You...</div>
        <div id="hint-text" style="color: var(--accent); margin-top:10px; font-size:0.8rem; opacity:0; transition:0.5s;">CLICK THE ENVELOPE</div>
    </div>

    <div id="scene4" class="scene">
        <div id="orbit-system">
            <div id="satellite-container">
                <img src="https://picsum.photos/seed/a1/400/600" class="photo-card photo-orbit">
                <img src="https://picsum.photos/seed/a2/400/600" class="photo-card photo-orbit">
                <img src="https://picsum.photos/seed/a3/400/600" class="photo-card photo-orbit">
                <img src="https://picsum.photos/seed/a4/400/600" class="photo-card photo-orbit">
                <img src="https://picsum.photos/seed/a5/400/600" class="photo-card photo-orbit">
                <img src="https://picsum.photos/seed/a6/400/600" class="photo-card photo-orbit">
            </div>
            <img src="https://picsum.photos/seed/m1/500/750" class="photo-card photo-main" id="center-photo">
        </div>
        <div class="final-wish" id="final-text">Happy Birthday, Sumitra! ❤️</div>
    </div>

<script>
    const music = document.getElementById('bg-music');
    
    function startEverything() {
        music.play().catch(e => console.log("Audio failed"));
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('start-screen').style.display = 'none';
            transition(null, 'scene1');
            typeWriter();
        }, 800);
    }

    // Ribbon Background
    const layer = document.getElementById('ribbon-layer');
    for (let i = 0; i < 20; i++) {
        const r = document.createElement('div');
        r.className = 'falling-ribbon';
        r.style.left = Math.random() * 100 + 'vw';
        r.style.animationDuration = (Math.random() * 2 + 3) + 's';
        r.style.animationDelay = Math.random() * 5 + 's';
        layer.appendChild(r);
    }

    const words = "Happy Birthday, Sumitra.";
    let charIndex = 0;
    function typeWriter() {
        const target = document.getElementById('type-target');
        if (charIndex < words.length) {
            target.innerHTML += words.charAt(charIndex);
            charIndex++;
            setTimeout(typeWriter, 100);
        } else {
            setTimeout(() => transition('scene1', 'scene2'), 2500);
        }
    }

    const birthdayDate = "April 20, 2026";
    let dateIndex = 0;
    function typeDate() {
        const dateTarget = document.getElementById('date-typing');
        if (dateIndex < birthdayDate.length) {
            dateTarget.innerHTML += birthdayDate.charAt(dateIndex);
            dateIndex++;
            setTimeout(typeDate, 150);
        }
    }

    function transition(curr, next) {
        if(curr) {
            document.getElementById(curr).classList.remove('active-scene');
            setTimeout(() => { document.getElementById(curr).style.display = 'none'; }, 1000);
        }
        
        const n = document.getElementById(next);
        n.style.display = 'flex';
        setTimeout(() => {
            n.classList.add('active-scene');
            if(next === 'scene2') {
                typeDate();
                setTimeout(blowCandle, 5000);
            }
            if(next === 'scene3') {
                document.getElementById('msg-text').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('teddy-scene3').style.opacity = '0';
                    document.getElementById('envelope').style.opacity = '1';
                    setTimeout(() => { document.getElementById('hint-text').style.opacity = '1'; }, 2000);
                }, 2000);
            }
        }, 50);
    }

    function blowCandle() {
        document.getElementById('flame').style.opacity = '0';
        setTimeout(() => transition('scene2', 'scene3'), 1500);
    }

    function openLetter() {
        document.getElementById('hint-text').style.display = 'none';
        document.getElementById('envelope').classList.add('open');
        setTimeout(() => {
            document.getElementById('manuscript-popup').classList.add('popup-active');
        }, 800);
    }

    function goToOrbit() {
        document.getElementById('manuscript-popup').classList.remove('popup-active');
        const env = document.getElementById('envelope');
        env.style.transform = "scale(0)";
        env.style.opacity = "0";
        setTimeout(() => {
            transition('scene3', 'scene4');
            setTimeout(startOrbit, 1200);
        }, 500);
    }

    function startOrbit() {
        const orbits = document.querySelectorAll('.photo-orbit');
        const main = document.getElementById('center-photo');
        const container = document.getElementById('satellite-container');
        const radius = window.innerWidth < 600 ? window.innerWidth * 0.35 : 300;

        [...orbits, main].forEach((p, idx) => {
            setTimeout(() => {
                p.style.opacity = '1';
                if (p !== main) {
                    const angle = (idx / orbits.length) * 360;
                    const x = Math.sin(angle * Math.PI / 180) * radius;
                    const z = Math.cos(angle * Math.PI / 180) * radius;
                    p.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${angle}deg)`;
                } else {
                    p.style.transform = `translateZ(50px)`;
                }
            }, idx * 150);
        });

        setTimeout(() => {
            container.style.animationPlayState = 'running';
            document.getElementById('final-text').style.opacity = '1';
        }, 2000);
    }
</script>
</body>
</html>
